name: weight_nest
description: "鹦鹉体重记录系统 - 支持局域网多人协同"
publish_to: 'none'
version: 1.7.3+19

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 数据库
  drift: ^2.22.0
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.26
  path_provider: ^2.1.5
  path: ^1.9.0

  # 嵌入式服务器（局域网联机）
  shelf: ^1.4.2
  shelf_router: ^1.1.4

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 局域网同步
  http: ^1.2.2

  # 工具
  intl: ^0.19.0
  shared_preferences: ^2.3.4

  # Excel 导出
  excel: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # 代码生成
  drift_dev: ^2.22.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

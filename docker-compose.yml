services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: weightnest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    ports:
      - "8080:8080"
    environment:
      PG_HOST: db
      PG_PORT: 5432
      PG_DATABASE: weightnest
      PG_USERNAME: postgres
      PG_PASSWORD: postgres
      SERVER_PORT: "8080"
      SERVER_PIN: "1234"
      SERVER_HOST: ${SERVER_HOST:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
